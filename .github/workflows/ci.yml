name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Restrict GITHUB_TOKEN to read-only access. The CI workflow only needs to
# check out code, install dependencies and run scripts – no write access
# to the repo is required.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox
      - name: Type-check
        run: pnpm run lint
      - name: Prettier
        run: pnpm run format:check
      - name: Test (Vitest browser mode – Chromium + Firefox via Playwright)
        run: pnpm test
      - name: Build
        run: pnpm run build
