name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Restrict GITHUB_TOKEN to read-only access. The CI workflow only needs to
# check out code, install dependencies and run scripts – no write access
# to the repo is required.
permissions:
  contents: read

jobs:
  # Fast pre-check: fail with a clear message if package-lock.json is out of
  # sync with package.json, instead of letting the full build matrix fail
  # later with the cryptic "npm ci can only install packages when your
  # package.json and package-lock.json are in sync" error.
  lockfile-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
      - name: Verify package-lock.json is in sync with package.json
        run: |
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          if ! git diff --exit-code -- package-lock.json; then
            echo ""
            echo "::error::package-lock.json is out of sync with package.json."
            echo "::error::Run 'npm install' locally and commit the updated package-lock.json."
            exit 1
          fi

  build:
    needs: lockfile-sync
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox
      - name: Type-check
        run: npm run lint
      - name: Prettier
        run: npm run format:check
      - name: Test (Vitest browser mode – Chromium + Firefox via Playwright)
        run: npm test
      - name: Build
        run: npm run build
